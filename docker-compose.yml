services:
  db:
    image: mysql:8.0.25
    container_name: finance-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: finance
      MYSQL_DATABASE: finance
      MYSQL_USER: finance
      MYSQL_PASSWORD: finance
    ports:
      - '3306:3306'
    volumes:
      - finance_mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=caching_sha2_password
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-ufinance', '-pfinance']
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  finance_mysql_data:
